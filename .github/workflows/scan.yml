name: Property Scanner
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - name: Run scraper
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python scraper.py
      - name: Commit results
        run: |
          git config user.name "Scanner Bot"
          git config user.email "scanner@github.actions"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data"
          else
            git commit -m "Scan $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
